<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}Billy Bassistant{% endblock %}</title>
    <link href="../static/css/styles.css" rel="stylesheet">
    <link rel="icon" href="../static/favicon.ico" type="image/x-icon">
    {% block extra_head %}{% endblock %}
</head>
<body class="text-white font-sans">
    {% block header %}{% endblock %}

    {% block main_content %}{% endblock %}

    {% block footer %}
    <footer class="backdrop-blur-xs fixed bottom-0 p-4 left-0 w-full h-20 shadow-[0_-6px_12px_rgba(0,0,0,0.2)]">
    </footer>
    {% endblock %}

    {% include "components/password-modal.html" %}

    <!-- Global Notification Bar -->
    <div id="notification"
         class="hidden w-full fixed top-0 left-0 text-center text-white font-semibold py-2 px-4 rounded shadow-lg transition-opacity duration-300"
         style="z-index: 2147483647;"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay"
        class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6"
        style="z-index: 2147483000;">
        <div>
            <img src="{{ url_for('static', filename='images/status-reloading.gif') }}"
                 alt="Reloading"
                 class="w-full max-w-[300px] h-auto object-contain select-none"
                 draggable="false">
            <p id="loading-overlay-text" class="bg-zinc-900/80 border border-zinc-700 rounded-lg px-6 py-5 shadow-2xl w-full max-w-2xl text-sm text-zinc-200 text-center">
                Restarting Billy... reconnecting interface.
            </p>
        </div>
    </div>

    {% block scripts %}
    <script src="{{ url_for('static', filename='js/marked-min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui-helpers.js') }}"></script>
    <script src="{{ url_for('static', filename='js/config-service.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/log-panel.js') }}"></script>
    <script src="{{ url_for('static', filename='js/service-status.js') }}"></script>
    <script src="{{ url_for('static', filename='js/websocket.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pin-profile.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings-form.js') }}"></script>
    <script src="{{ url_for('static', filename='js/persona-form.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings-panel.js') }}"></script>
    <script src="{{ url_for('static', filename='js/wakeup-clips.js') }}"></script>
    <script src="{{ url_for('static', filename='js/audio-panel.js') }}"></script>
    <script src="{{ url_for('static', filename='js/motor-panel.js') }}"></script>
    <script src="{{ url_for('static', filename='js/wake-word-panel.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sections.js') }}"></script>
    <script src="{{ url_for('static', filename='js/songs-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/version-release.js') }}"></script>
    <script src="{{ url_for('static', filename='js/init.js') }}"></script>
    {% endblock %}
</body>
</html>
