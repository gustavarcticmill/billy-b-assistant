<!-- Env Editor Modal -->
<div id="env-editor-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-zinc-900/60 backdrop-blur-xs border border-zinc-700 rounded-lg w-full max-w-3xl max-h-[90vh] mx-4 shadow-2xl flex flex-col">
        <div class="flex justify-between items-center p-4 border-b border-zinc-700">
            <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                <span class="material-icons text-amber-400">admin_panel_settings</span>
                .env Editor
            </h3>
            <button id="close-env-editor-modal" class="text-zinc-400 hover:text-white">
                <span class="material-icons">close</span>
            </button>
        </div>
        <form id="env-editor-form" class="p-6 space-y-3 overflow-y-auto">
            <label for="env-textarea" class="sr-only">Environment Configuration</label>
            <textarea id="env-textarea" rows="25"
                      wrap="off"
                      class="w-full h-[50vh] max-h-[50vh] bg-zinc-800/80 text-amber-500 p-3 rounded font-mono resize-none border border-yellow-600 focus:outline-none focus:ring-2 focus:ring-amber-500 overflow-x-auto whitespace-pre"
                      spellcheck="false">Loading .env…</textarea>

            <div class="bg-yellow-700/80 text-yellow-100 p-2 rounded border border-yellow-600 flex gap-2 items-center">
                <span class="material-icons">warning</span>
                Changes will be written to .env as-is. Invalid values could cause errors. Save only if you're sure of your changes.
            </div>

            <div class="pt-1 flex items-center justify-between">
                <button id="cancel-env-editor-modal"
                        type="button"
                        class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 text-white rounded transition-colors">
                    Cancel
                </button>
                <button id="save-env-btn"
                        type="submit"
                        class="bg-amber-500 hover:bg-amber-400 text-zinc-800 text-sm font-semibold py-2 px-4 rounded shadow">
                    Save .env
                </button>
            </div>
        </form>
    </div>
</div>
